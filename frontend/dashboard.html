<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiBudget Dashboard</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- ChartJS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>💰 OptiBudget</h2>

    <ul>
      <li onclick="showSection('dashboard')">🏠 Dashboard</li>
      <li onclick="showSection('expenses')">💸 Expenses</li>
      <li onclick="showSection('profile')">👤 Profile</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <!-- MAIN WINDOW -->
  <div class="main">

    <!-- TOP NAV -->
    <div class="topbar">
      <h2 id="welcome">Welcome to OptiBudget</h2>
      <span>👤 User</span>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboard" class="section">

      <div class="cards">
        <div class="card">Total Expense <span id="total">₹0</span></div>
        <div class="card">Remaining <span id="remaining">₹0</span></div>
        <div class="card">Alerts <span id="alerts">✔ Safe</span></div>
        <div class="card">
          <h3>Predicted Expense</h3>
          <p id="prediction">₹0</p>
        </div>
      </div>
      
      <div class="charts">
        <div class="chart-box">
          <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-box">
          <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
          <canvas id="lineChart"></canvas>
        </div>
      </div>

    </div>

    <!-- EXPENSE SECTION -->
    <div id="expenses" class="section" style="display:none">
      <h2>Add Expense</h2>

      <!-- Form Wrapper for perfect horizontal alignment -->
      <div class="add-expense-form">
        <input id="title" placeholder="Expense Title (e.g. Groceries)">
        <input id="amount" type="number" placeholder="Amount in ₹">
        <button onclick="addExpense()">Add Expense</button>
      </div>

      <div id="list"></div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profile" class="section" style="display:none">

      <div class="profile-card">
        <h2>👤 My Profile</h2>

        <div class="profile-item">
          <label>Name:</label>
          <span id="nameDisplay">User</span>
        </div>

        <div class="profile-item">
          <label>Email:</label>
          <span id="emailDisplay">email@example.com</span>
        </div>

        <div class="profile-item">
          <label>Total Budget:</label>
          <div class="budget-input-wrapper">
            <input id="newBudget" type="number" placeholder="Enter budget ₹">
            <button onclick="updateBudget()">Update</button>
          </div>
        </div>

        <div class="profile-item">
          <label>Remaining Budget:</label>
          <span id="remainingProfile">₹0</span>
        </div>

        <div class="profile-actions">
          <button onclick="resetBudget()" class="reset-btn">
            Reset Budget
          </button>

          <button onclick="resetData()" class="danger-btn">
            Reset All Data
          </button>
        </div>
      </div>

    </div>

  </div>

</div>

<!-- Main Javascript logic -->
<script src="script.js"></script>

</body>
</html>
