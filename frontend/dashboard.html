<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="nav">
  <h2>💸 OptiBudget</h2>
  <button onclick="logout()">Logout</button>
</div>

<!-- KPI CARDS -->
<div class="grid">

  <div class="card-small">
    <h3>Total Expense</h3>
    <p id="total">₹0</p>
  </div>

  <div class="card-small">
    <h3>Prediction</h3>
    <p id="prediction">₹0</p>
  </div>

  <div class="card-small">
    <h3>Remaining Budget</h3>
    <p id="remaining">₹0</p>
  </div>

</div>

<!-- ADD EXPENSE -->
<div class="card">
  <h3>Add Expense</h3>
  <input id="title" placeholder="Title">
  <input id="amount" placeholder="Amount">
  <button onclick="addExpense()">Add</button>
</div>

<!-- CHARTS -->
<div class="card">
  <h3>Expense Distribution</h3>
  <canvas id="pieChart"></canvas>
</div>

<div class="card">
  <h3>Expense Trend</h3>
  <canvas id="barChart"></canvas>
</div>

<!-- LIST -->
<div class="card">
  <h3>Your Expenses</h3>
  <div id="list"></div>
</div>

<!-- ALERT -->
<div class="card">
  <h3>⚠ Alerts</h3>
  <div id="alerts"></div>
</div>

<script src="script.js"></script>
</body>
</html>
