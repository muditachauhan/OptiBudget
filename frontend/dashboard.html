<!DOCTYPE html>
<html>
<head>
  <title>OptiBudget Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>💰 OptiBudget</h2>

    <ul>
      <li onclick="showSection('dashboard')">🏠 Dashboard</li>
      <li onclick="showSection('expenses')">💸 Expenses</li>
      <li onclick="showSection('profile')">👤 Profile</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP NAV -->
    <div class="topbar">
      <h2 id="welcome"></h2>
      <span>👤 User</span>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboard" class="section">

      <div class="cards">
        <div class="card">Total Expense <br><span id="total">₹0</span></div>
        <div class="card">Remaining <br><span id="remaining">₹0</span></div>
        <div class="card">Alerts <br><span id="alerts">✔ Safe</span></div>
        <div class="card">
          <h3>Predicted Expense</h3>
          <p id="prediction">₹0</p>
        </div>
      </div>
      
      <div class="charts">
        <div class="chart-box">
          <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-box">
          <canvas id="barChart"></canvas>
        </div>
        <div class="chart-box">
          <canvas id="lineChart"></canvas>
        </div>
      </div>

    </div>

    <!-- EXPENSE SECTION -->
    <div id="expenses" class="section" style="display:none">
      <h2>Add Expense</h2>

      <input id="title" placeholder="Title">
      <input id="amount" placeholder="Amount">

      <button onclick="addExpense()">Add</button>

      <div id="list"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="section" style="display:none">

      <div class="profile-card">

        <h2>👤 My Profile</h2>

          <div class="profile-item">
            <label>Name:</label>
            <span id="nameDisplay">User</span>
          </div>

          <div class="profile-item">
            <label>Email:</label>
            <span id="emailDisplay"></span>
          </div>

          <div class="profile-item">
            <label>Total Budget:</label>
            <input id="newBudget" placeholder="₹ Enter budget">
            <button onclick="updateBudget()">Update</button>
          </div>

          <div class="profile-item">
            <label>Remaining Budget:</label>
            <span id="remainingProfile">₹0</span>
          </div>

          <div class="profile-actions">
            <button onclick="resetBudget()" class="reset-btn">
               Reset Budget
            </button>

            <button onclick="resetData()" class="danger-btn">
               Reset All Data
            </button>
          </div>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
