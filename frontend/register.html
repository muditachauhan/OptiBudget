<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - OptiBudget</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-body">

<div class="auth-container">

  <div class="auth-box">

    <h1>🌸 Create Account</h1>
    <p class="subtitle">Start your budgeting journey today 💖</p>

    <input id="name" placeholder="👤 Your Name">
    <input id="email" placeholder="📧 Email Address">
    <input id="password" type="password" placeholder="🔐 Password" onkeyup="checkPassword()">
    <div id="strength" class="strength-indicator"></div>
    <input id="budget" type="number" placeholder="💰 Monthly Budget ₹">

    <button onclick="register()">Register 🎉</button>

    <p class="switch">
      Already have account? <span onclick="goLogin()">Login 🔐</span>
    </p>

  </div>

</div>
<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
